services:
  postgres:
    image: postgres:16

    container_name: store-intelligence-postgres

    environment:
      POSTGRES_DB: store_intelligence
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d store_intelligence"]
      interval: 10s
      timeout: 5s
      retries: 5

    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: store-intelligence-api

    env_file:
      - .env

    ports:
      - "8000:8000"

    depends_on:
      postgres:
        condition: service_healthy

    restart: unless-stopped

volumes:
  postgres_data: